<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navega Porções e Petiscaria</title>

    <style>
        #meuModal, #modalCarrinho { display: none; }
        .img-produto { width: 75px; height: 75px; object-fit: cover; border-radius: 10px; background: #f3f4f6; border: 1px solid #e5e7eb; }
        .header-navega { background-color: #1e40af; border-bottom: 4px solid #facc15; }
        .logo-perfil { width: 85px; height: 85px; border: 3px solid #facc15; border-radius: 50%; background: white; margin: 0 auto 10px; display: block; object-fit: cover; }
        .aba-ativa { border-bottom: 4px solid #facc15; color: #1e40af; background-color: #f8fafc; }
        .divisor-tamanho { background: #eff6ff; color: #1e40af; padding: 8px 15px; font-weight: 900; font-style: italic; text-transform: uppercase; font-size: 12px; border-left: 5px solid #facc15; margin-top: 15px; border-radius: 4px; }
        .loja-fechada { filter: grayscale(1); pointer-events: none; opacity: 0.6; }
        .badge-fechado { background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 pb-40 font-sans text-gray-900">

    <header class="header-navega text-white p-6 text-center shadow-lg">
        <img src="https://i.ibb.co/4ZmMtPGn/1000080038.png" class="logo-perfil shadow-md">
        <h1 class="text-base font-black uppercase italic tracking-tighter text-white">🚀 NAVEGA PORÇÕES E PETISCARIA 🚀</h1>
        <div id="status-loja-badge"></div>
    </header>

    <div class="bg-white shadow-sm p-3 flex gap-2 border-b text-center justify-center">

    </div>

    <div class="sticky top-0 bg-white shadow-md z-40 flex justify-around border-b font-black uppercase italic">
        <button onclick="filtrar('porcoes')" id="tab-porcoes" class="py-5 w-full aba-ativa text-base">🍟 Porções</button>
        <button onclick="filtrar('bebidas')" id="tab-bebidas" class="py-5 w-full text-gray-400 text-base">🥤 Bebidas</button>
    </div>

    <div id="lista-produtos" class="p-4 space-y-4"></div>

    <footer id="footer-carrinho" class="fixed bottom-0 w-full bg-white p-4 flex justify-between items-center shadow-2xl border-t z-50">
        <div onclick="abrirCarrinho()" class="cursor-pointer">
            <p class="text-[10px] text-gray-400 font-black uppercase mb-1">Total 🛒</p>
            <p id="total-txt" class="text-2xl font-black text-blue-700 italic">R$ 0,00</p>
        </div>
        <button id="btn-finalizar" onclick="abrirCarrinho()" class="bg-green-500 text-white px-8 py-4 rounded-xl font-black uppercase italic text-sm shadow-md active:scale-95 transition-all">Fazer Pedido 🚀</button>
    </footer>

    <div id="modalCarrinho" class="fixed inset-0 bg-black/80 z-[60] flex items-end" onclick="fecharCarrinho()">
        <div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl overflow-y-auto max-h-[90%]" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="font-black text-xl italic uppercase text-blue-800 text-center w-full ml-6">Finalizar Pedido 🛍️</h2>
                <button onclick="fecharCarrinho()" class="bg-gray-100 text-gray-500 w-10 h-10 rounded-full font-black text-xl shadow-inner flex items-center justify-center border">✕</button>
            </div>
            <div id="itens-sacola" class="space-y-3 mb-4 text-sm font-bold"></div>
            
            <div class="space-y-1 p-3 bg-gray-100 rounded-xl mb-6 border border-dashed border-gray-300">
                <div class="flex justify-between items-center">
                    <span class="font-black uppercase italic text-gray-500 text-[10px]">Taxa de Entrega:</span>
                    <span id="taxa-entrega-txt" class="font-black text-sm text-gray-700 italic">R$ 0,00</span>
                </div>
                <div class="flex justify-between items-center border-t pt-1">
                    <span class="font-black uppercase italic text-gray-500 text-[11px]">Total do Pedido:</span>
                    <span id="total-sacola-txt" class="font-black text-xl text-blue-800 italic">R$ 0,00</span>
                </div>
            </div>

            <div class="mb-6 space-y-3 bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <p class="text-blue-800 font-black text-[10px] uppercase italic mb-1">📍 Endereço de Entrega:</p>
    <input type="text" id="end-rua" placeholder="Rua e Número" class="w-full border rounded-lg p-3 text-sm">
    
    <div class="relative">
        <input type="text" id="end-bairro" placeholder="Digite seu Bairro" class="w-full border rounded-lg p-3 text-sm font-bold uppercase" oninput="validarBairroDinamico(this.value)" autocomplete="off">
        <div id="lista-sugestoes-bairro" class="hidden absolute z-50 bg-white border w-full rounded-b-lg shadow-xl max-h-40 overflow-y-auto text-sm font-bold uppercase text-blue-800"></div>
    </div>

    <div id="alerta-taxa" class="hidden text-[10px] font-black uppercase italic p-2 rounded-lg text-center"></div>
<input type="text" id="end-ref" placeholder="Ponto de referência" class="w-full border rounded-lg p-3 text-sm">
<textarea id="obs-pedido" placeholder="Alguma observação?" class="w-full border rounded-lg p-3 text-sm" rows="2"></textarea>

            <div class="mb-6">
                <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 font-bold">Pagamento</label>
                <select id="pagamento" class="w-full border rounded-lg p-3 text-sm bg-white font-bold" onchange="verificarDinheiro(this.value)">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
                <div id="div-troco" class="mt-3 hidden">
                    <input type="number" id="troco-para" placeholder="Troco para quanto?" class="w-full border-2 border-blue-100 rounded-lg p-3 text-sm bg-blue-50">
                </div>
            </div>
            <button onclick="enviarPedido()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black uppercase italic shadow-lg mb-4">Enviar Pedido 🚀</button>
        </div>
    </div>

    <div id="meuModal" class="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-6" onclick="fecharModal()">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <img id="m-img" src="" class="w-full h-64 object-cover">
            <div class="p-6 text-center">
                <h2 id="m-titulo" class="font-black text-blue-800 border-b pb-2 uppercase italic text-xl mb-4"></h2>
                <p id="m-desc" class="py-4 text-gray-700 italic text-base px-2"></p>
                <button onclick="fecharModal()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-black uppercase mt-4">Voltar</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {

            authDomain: "navega-porcoes.firebaseapp.com",
            databaseURL: "https://navega-porcoes-default-rtdb.firebaseio.com",

        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let categoriaAtual = 'porcoes';
        let sacola = {};
        let taxaAtual = 0.00;
        let dadosGlobais = null;
        let listaExibicao = [];

        // FOTOS FIXAS DOS ITENS QUE JÁ TEMOS
        let produtosFixos = [
            { id: 1, grupo: 'Tamanho P', foto: 'https://i.ibb.co/RkcBxdMr/batata-frita-com-bacon-e-cheddar-na-airfryer.jpg' },

            { id: 13, grupo: 'Tamanho M', foto: 'https://i.ibb.co/PzDhvMtF/IMG-20260319-205625.jpg' },
            { id: 14, grupo: 'Tamanho M', foto: 'https://i.ibb.co/bjtSP7CC/IMG-20260418-211926.png' },
            { id: 15, grupo: 'Tamanho M', foto: 'https://i.ibb.co/GfbPFfZQ/IMG-20260418-201125.jpg' },
            { id: 20, grupo: 'Tamanho G', foto: 'https://i.ibb.co/sdF0BmzQ/IMG-20260418-185448.jpg' },

            { id: 25, grupo: 'Tamanho G', foto: 'https://i.ibb.co/203tt4m9/IMG-20260326-WA0020.jpg' },
            { id: 50, grupo: 'Refrigerantes', foto: 'https://i.ibb.co/7tMVsnPS/2301822-7894900027013-BEB-REFRIG-COCA-COLA-2-L-PET.jpg' },
            { id: 51, grupo: 'Refrigerantes', foto: 'https://i.ibb.co/B5qbSsBV/IMG-20260418-192121.jpg' },

            { id: 100, grupo: 'Refrigerantes', foto: 'https://i.ibb.co/7tMVsnPS/2301822-7894900027013-BEB-REFRIG-COCA-COLA-2-L-PET.jpg' },
            { id: 101, grupo: 'Refrigerantes', foto: 'https://i.ibb.co/B5qbSsBV/IMG-20260418-192121.jpg' },
            { id: 102, grupo: 'Refrigerantes', foto: 'https://i.ibb.co/zHLh5MM5/whatsapp-image-2024-08-13-at-13-05-44.jpg' }
        ];

        function monitorarFirebase() {
            db.ref('navega_data').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    dadosGlobais = snapshot.val();
                    const precosCloud = dadosGlobais.produtos || [];
                    const descCloud = dadosGlobais.descricoes || {};
                    
                    listaExibicao = precosCloud.map(pCloud => {
                        const fixo = produtosFixos.find(f => f.id === pCloud.id);
                        const nome = pCloud.nome || "";
                        
                        // IDENTIFICA SE É BEBIDA PELO NOME OU ID
                        const ehBebida = nome.includes("2L") || nome.includes("Lata") || nome.includes("Coca") || nome.includes("Suco") || pCloud.id >= 100;

                        return {
                            id: pCloud.id,
                            nome: nome || "Novo Item",
                            preco: parseFloat(pCloud.preco) || 0,
                            esgotado: pCloud.esgotado || false,
                            cat: ehBebida ? 'bebidas' : 'porcoes',
                            grupo: fixo ? fixo.grupo : (ehBebida ? 'Refrigerantes' : (pCloud.id < 10 ? 'Tamanho P' : pCloud.id < 20 ? 'Tamanho M' : 'Tamanho G')),
                            desc: descCloud[pCloud.id] || "Novidade na Navega!",
                            foto: fixo ? fixo.foto : "https://i.ibb.co/4ZmMtPGn/1000080038.png"
                        };
                    });

                    const config = dadosGlobais.config;
                    if (config) {
                        document.getElementById('info-preparo').innerHTML = `⏱️ PREPARO: ${config.preparo} | 🛵 ENTREGA: ${config.entrega}`;
                        const btnFinal = document.getElementById('btn-finalizar');
                        if (!config.aberta) {
                            document.body.classList.add('loja-fechada');
                            document.getElementById('status-loja-badge').innerHTML = `<span class="badge-fechado font-black uppercase italic">Loja Fechada</span>`;
                            btnFinal.innerText = "LOJA FECHADA";
                        } else {
                            document.body.classList.remove('loja-fechada');
                            document.getElementById('status-loja-badge').innerHTML = "";
                            btnFinal.innerText = "Fazer Pedido 🚀";
                        }
                    }
                    renderizarProdutos();
                }
            });
        }

        function renderizarProdutos() {
            const container = document.getElementById('lista-produtos');
            const filtrados = listaExibicao.filter(p => p.cat === categoriaAtual && !p.esgotado);
            let html = ""; let ultimo = "";
            filtrados.forEach(p => {
                if (p.grupo !== ultimo) { html += `<div class="divisor-tamanho">${p.grupo}</div>`; ultimo = p.grupo; }
                const v = (parseFloat(p.preco) || 0).toFixed(2).replace('.', ',');
                html += `
                <div class="bg-white rounded-xl shadow-sm flex border p-2 items-center">
                    <img src="${p.foto}" class="img-produto" onclick="abrirDetalhes('${p.nome}','${p.desc}','${p.foto}')">
                    <div class="px-3 flex-1">
                        <h3 class="font-black text-blue-900 text-[13px] uppercase italic leading-tight">${p.nome}</h3>
                        <p class="text-green-600 font-black text-sm">R$ ${v}</p>
                        <button onclick="abrirDetalhes('${p.nome}','${p.desc}','${p.foto}')" class="text-[9px] font-black text-blue-700 bg-blue-50 px-2 py-1 rounded mt-1 uppercase">Detalhes 🔍</button>
                    </div>
                    <div class="flex items-center bg-gray-100 rounded-xl border p-1">
                        <button onclick="mudarQtd(${p.id},-1)" class="w-8 h-8 bg-white rounded text-red-500 font-black">-</button>
                        <span class="font-black w-6 text-center text-xs">${sacola[p.id]?.qtd || 0}</span>
                        <button onclick="mudarQtd(${p.id},1)" class="w-8 h-8 bg-white rounded text-blue-600 font-black">+</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html || "<p class='text-center text-gray-400 py-10 font-bold uppercase italic text-xs'>Nenhum item disponível nesta categoria.</p>";
        }

        function mudarQtd(id, v) {
            if (!sacola[id]) {
                const pBase = listaExibicao.find(p => p.id === id);
                sacola[id] = { ...pBase, qtd: 0 };
            }
            sacola[id].qtd += v;
            if (sacola[id].qtd <= 0) delete sacola[id];
            renderizarProdutos(); atualizarRodape();
        }

        function atualizarRodape() {
            let sub = 0; for(let i in sacola) { sub += sacola[i].qtd * (parseFloat(sacola[i].preco) || 0); }
            const total = sub + taxaAtual;
            document.getElementById('total-txt').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
            const ts = document.getElementById('total-sacola-txt');
            const tt = document.getElementById('taxa-entrega-txt');
            if(ts) ts.innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
            if(tt) tt.innerText = (taxaAtual === 0) ? "GRÁTIS" : `R$ ${taxaAtual.toFixed(2).replace('.',',')}`;
        }

                        function validarBairroDinamico(texto) {
            if(!dadosGlobais) return;
            // FUNÇÃO QUE MATA OS ACENTOS
            const normalizar = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
            const bairroDigitado = normalizar(texto);
            const alerta = document.getElementById('alerta-taxa');
            const btnEnviar = document.querySelector("#modalCarrinho button[onclick='enviarPedido()']");
            const taxasSalvas = dadosGlobais.taxas || [];
            
            // Busca o bairro ignorando acentos e maiúsculas
            const busca = taxasSalvas.find(t => normalizar(t.bairro) === bairroDigitado);

            if (busca) {
                taxaAtual = parseFloat(busca.valor) || 0;
                alerta.innerText = (taxaAtual === 0) ? "✅ ENTREGA GRÁTIS PARA ESTE BAIRRO!" : `🛵 TAXA DE ENTREGA: R$ ${taxaAtual.toFixed(2).replace('.', ',')}`;
                alerta.className = "block text-[10px] font-black uppercase italic p-2 rounded-lg bg-green-100 text-green-600 mt-2";
                btnEnviar.disabled = false;
                btnEnviar.className = "w-full bg-green-500 text-white py-4 rounded-xl font-black uppercase italic shadow-lg mb-4";
                btnEnviar.innerText = "Enviar Pedido 🚀";
            } else if (texto.length > 4) { 
                // SE DIGITOU MAIS DE 4 LETRAS E NÃO ACHOU NADA, BLOQUEIA! (Resolve o erro do Machados)
                taxaAtual = 0;
                alerta.innerText = "❌ BAIRRO NÃO ATENDIDO OU NÃO ENCONTRADO";
                alerta.className = "block text-[10px] font-black uppercase italic p-2 rounded-lg bg-red-100 text-red-600 mt-2";
                btnEnviar.disabled = true;
                btnEnviar.className = "w-full bg-gray-400 text-white py-4 rounded-xl font-black uppercase italic shadow-lg mb-4 cursor-not-allowed";
                btnEnviar.innerText = "Indisponível para esta região 🛑";
            } else {
                taxaAtual = 0;
                alerta.className = "hidden";
                btnEnviar.disabled = false;
                btnEnviar.className = "w-full bg-green-500 text-white py-4 rounded-xl font-black uppercase italic shadow-lg mb-4";
                btnEnviar.innerText = "Enviar Pedido 🚀";
            }
            atualizarRodape();
            mostrarSugestoes(texto); 
        }

        function mostrarSugestoes(texto) {
            const listaSugerida = document.getElementById('lista-sugestoes-bairro');
            const normalizar = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
            const termoBusca = normalizar(texto);

            listaSugerida.innerHTML = ""; 

            if (texto.length < 2) { 
                listaSugerida.classList.add('hidden'); 
                listaSugerida.style.display = 'none';
                return; 
            }
            
            const taxasSalvas = dadosGlobais.taxas || [];
            // Aqui a mágica acontece: ele filtra comparando os nomes sem acento!
            const filtrados = taxasSalvas.filter(t => normalizar(t.bairro).includes(termoBusca));

            if (filtrados.length > 0) {
                listaSugerida.innerHTML = filtrados.map(t => `<div class="p-3 border-b cursor-pointer hover:bg-blue-50" onclick="selecionarBairro('${t.bairro}')">${t.bairro}</div>`).join('');
                listaSugerida.classList.remove('hidden');
                listaSugerida.style.display = 'block';
            } else {
                listaSugerida.classList.add('hidden');
                listaSugerida.style.display = 'none';
            }
        }


                   function selecionarBairro(nome) {
            // 1. Preenche o campo de texto
            document.getElementById('end-bairro').value = nome;
            
            // 2. LIMPEZA TOTAL DA GAVETA
            const lista = document.getElementById('lista-sugestoes-bairro');
            lista.innerHTML = ""; 
            
            // FORÇA O FECHAMENTO (O segredo está aqui)
            setTimeout(() => {
                lista.classList.add('hidden');
                lista.style.display = 'none'; // Garante que suma visualmente
            }, 100);
            
            // 3. Atualiza os valores da Navega
            validarBairroDinamico(nome);
            atualizarRodape();
        }




        function enviarPedido() {
            const r = document.getElementById('end-rua').value;
            const b = document.getElementById('end-bairro').value;
            const ref = document.getElementById('end-ref').value;
            const obs = document.getElementById('obs-pedido').value;
            const pag = document.getElementById('pagamento').value;
            const trocoPara = parseFloat(document.getElementById('troco-para').value) || 0;

            if(!r || !b) return alert("Preencha o endereço!");
            
            let res = ""; let sub = 0;
            for(let i in sacola) { res += `🔹 *${sacola[i].qtd}x ${sacola[i].nome}*\n`; sub += sacola[i].qtd * (parseFloat(sacola[i].preco) || 0); }
            const total = sub + taxaAtual;
            const zap = dadosGlobais?.config?.whatsapp || "5547992153920";

            let m = `🎯 *NOVO PEDIDO - NAVEGA PORÇÕES* 🎯\n\n${res}\n📍 *END:* ${r}\n🏡 *BAIRRO:* ${b}\n`;
            if(ref) m += `📍 *REF:* ${ref}\n`;
            if(obs) m += `📝 *OBS:* ${obs}\n`;
            m += `\n💰 *PAG:* ${pag}\n`;
            if(pag === 'Dinheiro' && trocoPara > total) {
                m += `💵 *Troco para:* R$ ${trocoPara.toFixed(2).replace('.',',')}\n🤝 *(LEVAR R$ ${(trocoPara - total).toFixed(2).replace('.',',')} DE TROCO)*\n`;
            }
            m += (taxaAtual === 0) ? `🛵 *ENTREGA: GRÁTIS*\n` : `🛵 *TAXA:* R$ ${taxaAtual.toFixed(2).replace('.',',')}\n`;
            m += `\n👑 *TOTAL: R$ ${total.toFixed(2).replace('.',',')}* 👑`;
            
            window.open(`https://wa.me/${zap}?text=${encodeURIComponent(m)}`);
        }

        function abrirDetalhes(n,d,f) {
            document.getElementById('m-titulo').innerText = n;
            document.getElementById('m-desc').innerText = d;
            document.getElementById('m-img').src = f;
            document.getElementById('meuModal').style.display = 'flex';
        }

        function filtrar(c) {
            categoriaAtual = c;
            document.getElementById('tab-porcoes').className = (c === 'porcoes') ? 'py-5 w-full aba-ativa text-base' : 'py-5 w-full text-gray-400 text-base';
            document.getElementById('tab-bebidas').className = (c === 'bebidas') ? 'py-5 w-full aba-ativa text-base' : 'py-5 w-full text-gray-400 text-base';
            renderizarProdutos();
        }

        function fecharModal() { document.getElementById('meuModal').style.display = 'none'; }
        function fecharCarrinho() { document.getElementById('modalCarrinho').style.display = 'none'; }
        function abrirCarrinho() { 
            const l = document.getElementById('itens-sacola'); l.innerHTML = ""; let tem = false;
            for(let i in sacola) { tem = true; l.innerHTML += `<div class="p-2 bg-gray-50 border-b flex justify-between"><span>🔹 ${sacola[i].qtd}x ${sacola[i].nome}</span> <span>R$ ${(sacola[i].qtd * (parseFloat(sacola[i].preco) || 0)).toFixed(2)}</span></div>`; }
            if(!tem) return alert("Sacola vazia!");
            document.getElementById('modalCarrinho').style.display = 'flex'; 
        }
        function verificarDinheiro(v) { document.getElementById('div-troco').classList.toggle('hidden', v !== 'Dinheiro'); }

        monitorarFirebase();

    // --- CÓDIGO DO OLHO (CORRIGIDO) ---

    const visualizacaoRef = firebase.database().ref('online_agora/' + Math.floor(Math.random() * 1000000));

    visualizacaoRef.onDisconnect().remove();
